<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Clock</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <script src="clock.js" defer></script>
  </head>
  <body>
    <main>
      <svg id="clock" viewBox="-50 -50 100 100" role="img" aria-label="Local clock">
        <circle class="clock-face" cx="0" cy="0" r="47"></circle>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(0)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(30)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(60)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(90)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(120)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(150)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(180)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(210)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(240)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(270)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(300)"></line>
        <line class="clock-tick" x1="0" y1="-42" x2="0" y2="-47" transform="rotate(330)"></line>
        <line id="hand-hour" class="clock-hand clock-hand-hour" x1="0" y1="0" x2="0" y2="-24"></line>
        <line id="hand-minute" class="clock-hand clock-hand-minute" x1="0" y1="0" x2="0" y2="-34"></line>
        <line id="hand-second" class="clock-hand clock-hand-second" x1="0" y1="0" x2="0" y2="-39"></line>
      </svg>
    </main>
  </body>
</html>
